# Cross-OS × host Node matrix: build Runly, run smoke tests, execute Runly against
# multiple Node runtimes via npx (no nvm on the runner).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-runly:
    name: ${{ matrix.os }} · Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]

    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck / build
        run: npm run build

      - name: Unit smoke (repo test/)
        run: node --test test/smoke.test.js

      - name: Runly end-to-end (resolve 18/20/22 via npx, all rows pass)
        run: node dist/cli.js -c examples/all-versions-pass/runly.config.mjs
